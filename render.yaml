services:
  - type: web
    name: hiretrail-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hiretrail-db
          property: connectionString

databases:
  - name: hiretrail-db
    plan: free
